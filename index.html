<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./output.css">
    <title>Factorial Calculator</title>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 via-slate-100 to-slate-200 flex items-center justify-center p-4 ">
    <div class="w-full max-w-md bg-white/80 backdrop-blur-xl shadow-2xl rounded-3xl border border-slate-200 p-+ sm:p-8 space-y-6 ">
        <div class="text-center space-y-2">
            <div class="text-4xl">🧮</div>
            <h1 class="text-2xl sm:text-3xl font-bold text-slate-800">Factorial Calculator</h1>
            <p class="text-slate-500 text-sm">
                Introduce un número y obtén el factorial al instante
            </p>
        </div>

        <div>
            <label for="">Número</label>
            <input type="text">
        </div>
        <button>
            Calculate
        </button>
        <div></div>
        <p>
           Calculadora de factorial rápida y sencilla 
        </p>
    </div>
    <script src="app.js"></script>
</body>
</html>
