<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./output.css">
    <title>Factorial Calculator</title>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 via-slate-100 to-slate-200 flex items-center justify-center p-4 ">
    <div class="w-full max-w-md bg-white/80 backdrop-blur-xl shadow-2xl rounded-3xl border border-slate-200 p-+ sm:p-8 space-y-6 ">
        <div class="text-center space-y-2">
            <div class="text-4xl">🧮</div>
            <h1 class="text-2xl sm:text-3xl font-bold text-slate-800">Factorial Calculator</h1>
            <p class="text-slate-500 text-sm">
                Introduce un número y obtén el factorial al instante
            </p>
        </div>

        <div class="space-y-2">
            <label class="text-sm font-medium text-slate-600">Número</label>
            <input type="number" id="numero" class="w-full p-4 rounded-2xl border border-slate-200 bg-white focus:outline-none focus:ring-4 focus:ring-cyan-200 focus:border-cyan-400 transition text-lg ">
        </div>
        <button onclick="calcularFactorial()" class="w-full py-4 rounded-2xl bg-gradient-to-r from-cyan-500 to-blue-500 text-white font-semibold text-lg shadow-lg hover:scale-[1.02] active:scale-95 transition  ">
            Calculate
        </button>
        <div id="resultado" class="text-center text-lg font-semibold text-slate-700 bg-slate-50 border border-slate-200 p-4 min-h-[60px] flex items-center justify-center"></div>
        <p class="text-center text-xs text-slate-400">
           Calculadora de factorial rápida y sencilla 
        </p>
    </div>
    <script src="app.js"></script>
</body>
</html>
